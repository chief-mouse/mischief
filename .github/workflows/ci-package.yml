name: CI & Package

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  PYTHONIOENCODING: utf-8

jobs:
  test:
    name: Integration tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: pip install cryptography dill toml pytz

      - name: Version sources agree (semver discipline)
        run: python -c "import sys, toml; sys.path.insert(0, 'src'); import mschf; pv = toml.load('pyproject.toml')['tool']['briefcase']['version']; print('code:', mschf.__version__, '| pyproject:', pv); assert mschf.__version__ == pv, 'version mismatch'"

      - name: RBAC & signature verification
        run: python test_rbac.py

      - name: Authorizer enforcement
        run: python test_authorizer.py

      - name: Reactive redraw plumbing
        run: python test_reactive.py

      - name: Ledger replay audit
        run: python test_ledger_audit.py

      - name: Starter-app authoring
        run: python test_starter.py

      - name: Container generation (signed code deployment)
        run: python test_microapp.py

      - name: Org-CA trust store
        run: python test_trust_store.py

      - name: Hub-and-spoke sync
        run: python test_hub_sync.py

      - name: Identity directory
        run: python test_directory.py

      - name: Container binding (container_uid / payload v3)
        run: python test_container_binding.py

      # Intentionally omitted (import/instantiate toga — not headless-safe on CI):
      #   test_declarative.py, verify_microapp.py

  package-windows:
    name: Build Windows installer
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Briefcase
        run: pip install briefcase

      - name: Create app scaffold
        run: briefcase create windows app

      - name: Brand installer (WiX banner/dialog bitmaps)
        run: python scripts/brand_installer.py

      - name: Build app
        run: briefcase build windows app

      - name: Package MSI (unsigned)
        run: briefcase package windows app --adhoc-sign

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: mischief-msi
          path: dist/*.msi
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.msi
          generate_release_notes: true

  package-macos:
    name: Build macOS DMG
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Briefcase
        run: pip install briefcase

      - name: Create app scaffold
        run: briefcase create macOS app

      - name: Build app
        run: briefcase build macOS app

      # Ad-hoc signed → Gatekeeper requires right-click → Open on first launch.
      # Real distribution needs an Apple Developer ID + notarization (user decision).
      - name: Package DMG (ad-hoc signed)
        run: briefcase package macOS app --adhoc-sign

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: mischief-dmg
          path: dist/*.dmg
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
          generate_release_notes: true

  # Best-effort Linux packaging. GTK/system packaging on GitHub runners is
  # fiddly (missing/runtime libs, distro variance); this job is expected to be
  # iterated on real CI and is allowed to fail without blocking other platforms.
  package-linux:
    name: Build Linux .deb
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # No setup-python here ON PURPOSE: Briefcase Linux system packages must
      # be built with the DISTRO's system python3 (it refuses a mismatched
      # interpreter). Note the resulting .deb runs on the distro Python, which
      # may differ from desktop authors' 3.11 — dill-pickled micro-app UIs are
      # bytecode-version-locked across that gap (declarative specs are not).

      - name: Install GTK / Briefcase system build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-dev \
            python3-gi \
            python3-gi-cairo \
            gir1.2-gtk-3.0 \
            libgirepository1.0-dev \
            libgirepository-2.0-dev \
            libcairo2-dev \
            pkg-config \
            libgtk-3-dev \
            libpango1.0-dev \
            libgdk-pixbuf2.0-dev \
            libffi-dev

      # pipx keeps Briefcase off the PEP 668 externally-managed system env
      # while still running it under the system python3.
      - name: Install Briefcase
        run: pipx install briefcase

      - name: Create app scaffold
        run: briefcase create linux system

      - name: Build app
        run: briefcase build linux system

      - name: Package .deb
        run: briefcase package linux system

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: mischief-deb
          path: dist/*.deb
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.deb
          generate_release_notes: true

  # Packaged-app smoke: install the .deb, launch under Xvfb, assert first-run
  # artifacts land under MSCHF_HOME (packaged-paths fix), screenshot. New +
  # environment-sensitive; signal, not release-blocking — tighten once stable.
  smoke-linux:
    name: Smoke install+launch (Linux)
    needs: package-linux
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Download .deb artifact
        uses: actions/download-artifact@v4
        with:
          name: mischief-deb

      - name: Install package + smoke tools, launch, assert, screenshot
        shell: bash
        run: |
          set -euxo pipefail

          echo "=== artifact layout ==="
          find . -type f -print

          DEB=$(find . -name '*.deb' -type f | head -n 1)
          if [ -z "$DEB" ]; then
            echo "ERROR: no .deb found in downloaded artifact"
            exit 1
          fi
          echo "Found deb: $DEB"
          # apt needs a path with a slash for local packages
          case "$DEB" in
            /*|./*) ;;
            *) DEB="./$DEB" ;;
          esac

          sudo apt-get update
          # Dependency resolution succeeding is itself part of the test.
          sudo apt-get install -y "$DEB"

          PKG_NAME=$(dpkg-deb -f "$DEB" Package)
          echo "Installed package: $PKG_NAME"
          echo "=== dpkg -L $PKG_NAME ==="
          dpkg -L "$PKG_NAME"

          # Discover launch binary: prefer /usr/bin/*, else any */bin/* executable.
          # Do not hardcode a guessed name.
          BIN=""
          while IFS= read -r path; do
            if [ -f "$path" ] && [ -x "$path" ]; then
              case "$path" in
                /usr/bin/*)
                  BIN="$path"
                  break
                  ;;
              esac
            fi
          done < <(dpkg -L "$PKG_NAME")

          if [ -z "$BIN" ]; then
            while IFS= read -r path; do
              if [ -f "$path" ] && [ -x "$path" ]; then
                case "$path" in
                  */bin/*)
                    BIN="$path"
                    break
                    ;;
                esac
              fi
            done < <(dpkg -L "$PKG_NAME")
          fi

          if [ -z "$BIN" ]; then
            echo "ERROR: could not discover launch binary under /usr/bin or */bin for package $PKG_NAME"
            dpkg -L "$PKG_NAME"
            exit 1
          fi
          echo "Discovered launch binary: $BIN"

          sudo apt-get install -y xvfb imagemagick x11-utils dbus-x11 at-spi2-core

          export MSCHF_HOME="${RUNNER_TEMP}/mschf-home"
          mkdir -p "$MSCHF_HOME"
          echo "MSCHF_HOME=$MSCHF_HOME"

          Xvfb :99 -screen 0 1400x900x24 &
          XVFB_PID=$!
          export DISPLAY=:99
          # Give Xvfb a moment to bind the display
          sleep 2

          LOG_FILE="${GITHUB_WORKSPACE}/smoke-linux.log"
          SCREENSHOT="${GITHUB_WORKSPACE}/smoke-linux.png"
          : > "$LOG_FILE"

          # Forensics for silent native-layer deaths: faulthandler prints a
          # Python stack on segfault; unbuffered so partial output survives;
          # dbus-run-session provides the session bus GTK expects on bare
          # runners.
          export PYTHONFAULTHANDLER=1 PYTHONUNBUFFERED=1

          # Iteration-3 probe: the app exits 0 instantly with zero output.
          # Show what the launcher actually is, then run it FOREGROUND with
          # GLib debug so the reason lands in this log.
          echo "=== launcher file ==="
          file "$BIN"; head -n 40 "$BIN" || true
          echo "=== foreground probe (20s, G_MESSAGES_DEBUG=all) ==="
          set +e
          timeout 20 env G_MESSAGES_DEBUG=all "$BIN"
          echo "probe rc=$? (124 would mean it stayed alive - good)"
          set -e

          dbus-run-session -- "$BIN" >"$LOG_FILE" 2>&1 &
          APP_PID=$!
          echo "Launched PID=$APP_PID"
          sleep 25
          if ! kill -0 "$APP_PID" 2>/dev/null; then
            set +e; wait "$APP_PID"; echo "app exit code: $?"; set -e
            echo "=== dmesg tail (segfault forensics) ==="
            sudo dmesg 2>/dev/null | tail -n 12 || true
          fi

          # --- assertions ---
          if ! kill -0 "$APP_PID" 2>/dev/null; then
            echo "ERROR: app process (PID $APP_PID) is not alive after settle"
            echo "=== smoke-linux.log ==="
            cat "$LOG_FILE" || true
            echo "=== MSCHF_HOME ==="
            ls -la "$MSCHF_HOME" || true
            kill "$XVFB_PID" 2>/dev/null || true
            exit 1
          fi
          echo "App process still alive (PID $APP_PID)"

          MISSING=""
          for f in ca.crt admin.crt settings.toml; do
            if [ ! -f "$MSCHF_HOME/$f" ]; then
              MISSING="$MISSING $f"
            fi
          done
          if [ -n "$MISSING" ]; then
            echo "ERROR: first-run artifacts missing under MSCHF_HOME=$MSCHF_HOME:$MISSING"
            echo "(expected ca.crt, admin.crt, settings.toml via mschf.paths.host_root())"
            echo "=== MSCHF_HOME listing ==="
            ls -la "$MSCHF_HOME" || true
            echo "=== smoke-linux.log ==="
            cat "$LOG_FILE" || true
            kill "$APP_PID" 2>/dev/null || true
            kill "$XVFB_PID" 2>/dev/null || true
            exit 1
          fi
          echo "First-run artifacts present under $MSCHF_HOME:"
          ls -la "$MSCHF_HOME"

          # Screenshot of the Xvfb root window
          if ! import -display :99 -window root "$SCREENSHOT"; then
            echo "import failed; trying xwd | convert fallback"
            xwd -display :99 -root -out "${RUNNER_TEMP}/root.xwd"
            convert "${RUNNER_TEMP}/root.xwd" "$SCREENSHOT"
          fi
          ls -la "$SCREENSHOT"

          # Terminate app + Xvfb
          kill "$APP_PID" 2>/dev/null || true
          wait "$APP_PID" 2>/dev/null || true
          kill "$XVFB_PID" 2>/dev/null || true
          echo "Smoke Linux completed"

      - name: Upload smoke screenshot + log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-linux-screenshot
          path: |
            smoke-linux.png
            smoke-linux.log
          if-no-files-found: error

  # Packaged-app smoke: attach DMG, launch Cocoa binary, assert first-run
  # artifacts under MSCHF_HOME, screenshot. New + environment-sensitive;
  # signal, not release-blocking — tighten once stable.
  smoke-macos:
    name: Smoke install+launch (macOS)
    needs: package-macos
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - name: Download DMG artifact
        uses: actions/download-artifact@v4
        with:
          name: mischief-dmg

      - name: Attach DMG, launch, assert, screenshot
        shell: bash
        run: |
          set -euxo pipefail

          echo "=== artifact layout ==="
          find . -type f -print

          DMG=$(find . -name '*.dmg' -type f | head -n 1)
          if [ -z "$DMG" ]; then
            echo "ERROR: no .dmg found in downloaded artifact"
            exit 1
          fi
          echo "Found dmg: $DMG"

          ATTACH_OUT=$(hdiutil attach -nobrowse "$DMG")
          echo "=== hdiutil attach ==="
          echo "$ATTACH_OUT"
          # Mount point is a /Volumes/... path in the attach output — do not
          # hardcode the volume name.
          # Volume names contain spaces ("Mischief Workspace Manager 0.6.1"):
          # capture from /Volumes/ to end of line, then trim trailing whitespace.
          MOUNT=$(echo "$ATTACH_OUT" | grep -o '/Volumes/.*' | tail -n 1 | sed 's/[[:space:]]*$//')
          if [ -z "$MOUNT" ] || [ ! -d "$MOUNT" ]; then
            echo "ERROR: could not determine DMG mount point from hdiutil output"
            exit 1
          fi
          echo "Mount point: $MOUNT"
          echo "=== volume listing ==="
          ls -la "$MOUNT"

          APP_NAME=$(ls -1 "$MOUNT" | grep '\.app$' | head -n 1)
          if [ -z "$APP_NAME" ]; then
            echo "ERROR: no .app found on volume $MOUNT"
            ls -la "$MOUNT"
            hdiutil detach "$MOUNT" || true
            exit 1
          fi
          echo "Discovered app bundle: $APP_NAME"

          DEST="${RUNNER_TEMP}/MischiefApps"
          mkdir -p "$DEST"
          cp -R "$MOUNT/$APP_NAME" "$DEST/"
          APP_LOCAL="$DEST/$APP_NAME"
          echo "Copied app to: $APP_LOCAL"

          # Ad-hoc signed — clear quarantine so the binary can launch on the runner.
          xattr -dr com.apple.quarantine "$APP_LOCAL" || true

          BIN_DIR="$APP_LOCAL/Contents/MacOS"
          if [ ! -d "$BIN_DIR" ]; then
            echo "ERROR: missing Contents/MacOS in $APP_LOCAL"
            ls -laR "$APP_LOCAL" || true
            hdiutil detach "$MOUNT" || true
            exit 1
          fi
          echo "=== Contents/MacOS ==="
          ls -la "$BIN_DIR"

          BIN=""
          for f in "$BIN_DIR"/*; do
            if [ -f "$f" ] && [ -x "$f" ]; then
              BIN="$f"
              break
            fi
          done
          if [ -z "$BIN" ]; then
            echo "ERROR: no executable found in $BIN_DIR"
            ls -la "$BIN_DIR"
            hdiutil detach "$MOUNT" || true
            exit 1
          fi
          echo "Discovered launch binary: $BIN"

          export MSCHF_HOME="${RUNNER_TEMP}/mschf-home"
          mkdir -p "$MSCHF_HOME"
          echo "MSCHF_HOME=$MSCHF_HOME"

          LOG_FILE="${GITHUB_WORKSPACE}/smoke-macos.log"
          SCREENSHOT="${GITHUB_WORKSPACE}/smoke-macos.png"
          : > "$LOG_FILE"

          # Launch the binary directly (not `open`) so we own the process + env.
          "$BIN" >"$LOG_FILE" 2>&1 &
          APP_PID=$!
          echo "Launched PID=$APP_PID"
          sleep 25

          # --- assertions ---
          if ! kill -0 "$APP_PID" 2>/dev/null; then
            echo "ERROR: app process (PID $APP_PID) is not alive after settle"
            echo "=== smoke-macos.log ==="
            cat "$LOG_FILE" || true
            echo "=== MSCHF_HOME ==="
            ls -la "$MSCHF_HOME" || true
            hdiutil detach "$MOUNT" || true
            exit 1
          fi
          echo "App process still alive (PID $APP_PID)"

          MISSING=""
          for f in ca.crt admin.crt settings.toml; do
            if [ ! -f "$MSCHF_HOME/$f" ]; then
              MISSING="$MISSING $f"
            fi
          done
          if [ -n "$MISSING" ]; then
            echo "ERROR: first-run artifacts missing under MSCHF_HOME=$MSCHF_HOME:$MISSING"
            echo "(expected ca.crt, admin.crt, settings.toml via mschf.paths.host_root())"
            echo "=== MSCHF_HOME listing ==="
            ls -la "$MSCHF_HOME" || true
            echo "=== smoke-macos.log ==="
            cat "$LOG_FILE" || true
            kill "$APP_PID" 2>/dev/null || true
            hdiutil detach "$MOUNT" || true
            exit 1
          fi
          echo "First-run artifacts present under $MSCHF_HOME:"
          ls -la "$MSCHF_HOME"

          screencapture -x "$SCREENSHOT"
          ls -la "$SCREENSHOT"

          kill "$APP_PID" 2>/dev/null || true
          wait "$APP_PID" 2>/dev/null || true
          hdiutil detach "$MOUNT" || true
          echo "Smoke macOS completed"

      - name: Upload smoke screenshot + log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-macos-screenshot
          path: |
            smoke-macos.png
            smoke-macos.log
          if-no-files-found: error
