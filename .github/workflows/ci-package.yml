name: CI & Package

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  PYTHONIOENCODING: utf-8

jobs:
  test:
    name: Integration tests (storage layer)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: pip install cryptography dill toml

      - name: Version sources agree (semver discipline)
        run: python -c "import sys, toml; sys.path.insert(0, 'src'); import mschf; pv = toml.load('pyproject.toml')['tool']['briefcase']['version']; print('code:', mschf.__version__, '| pyproject:', pv); assert mschf.__version__ == pv, 'version mismatch'"

      - name: RBAC & signature verification
        run: python test_rbac.py

      - name: Authorizer enforcement
        run: python test_authorizer.py

      - name: Reactive redraw plumbing
        run: python test_reactive.py

      - name: Container generation (signed code deployment)
        run: python test_microapp.py

  package:
    name: Build Windows installer
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Briefcase
        run: pip install briefcase

      - name: Create app scaffold
        run: briefcase create windows app

      - name: Build app
        run: briefcase build windows app

      - name: Package MSI (unsigned)
        run: briefcase package windows app --adhoc-sign

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: mischief-msi
          path: dist/*.msi
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.msi
          generate_release_notes: true
