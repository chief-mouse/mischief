[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "mschf"
version = "0.8.0"
description = "Workspace Manager for cryptographically signed micro-apps (.msf) â€” hub, sync, and crypto core"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [
    { name = "Chief Mouse", email = "mouse.cheif@gmail.com" },
]
dependencies = [
    "cryptography>=3.2",
    "dill",
    "pytz",
    "toml",
]

[project.optional-dependencies]
# Pinned to 0.5.4: toga 0.5.5 has a WinForms proactor freeze regression
# (beeware/toga#4532; hot event-loop spin + thread leak that starves input
# after minutes idle). Revisit when that issue is fixed upstream.
gui = ["toga==0.5.4"]

[project.scripts]
mschf-hub = "mschf.hub:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.briefcase]
project_name = "Mschf"
bundle = "com.mschf"
version = "0.8.0"
url = "https://github.com/chief-mouse/mischief"
license = "MIT"
license-files = ["LICENSE"]
author = "Chief Mouse"
author_email = "mouse.cheif@gmail.com"

[tool.briefcase.app.mschf]
formal_name = "Mischief Workspace Manager"
description = "Workspace Manager for cryptographically signed micro-apps (.msf)"
long_description = """Mischief is a Workspace Manager for micro-apps: single .msf files (SQLite) \
carrying signed UI code, RBAC rules, and a replay-auditable ledger of \
cryptographically signed transactions, verified against a local X.509 CA."""
icon = "src/mschf/resources/mschf"
sources = ["src/mschf"]
requires = [
    # Pinned to 0.5.4: toga 0.5.5 has a WinForms proactor freeze regression
    # (beeware/toga#4532; hot event-loop spin + thread leak that starves input
    # after minutes idle). Revisit when that issue is fixed upstream.
    "toga==0.5.4",
    "cryptography>=3.2",
    "pytz",
    "toml",
    "dill",
]

[tool.briefcase.app.mschf.linux.system.debian]
# The bundled PyGObject is compiled against girepository-2.0 at package-build
# time, so the .deb must pull its runtime library (plus the GTK3 typelib) on
# install — without this, `import gi` dies with a silent ENOENT on fresh
# machines (found by the CI smoke test via strace).
system_runtime_requires = [
    "libgirepository-2.0-0",
    "gir1.2-gtk-3.0",
]

[tool.briefcase.app.mschf.macOS]
# arm64-only: Briefcase's default universal build also resolves x86_64 wheels,
# and current cryptography releases no longer ship macOS x86_64 wheels — the
# Intel half of a universal build cannot install. Intel Macs are unsupported
# until that changes (or a separate x86_64 build with an older pin is added).
universal_build = false
