[tool.briefcase]
project_name = "Mschf"
bundle = "com.mschf"
version = "0.4.2"
url = "https://github.com/chief-mouse/mischief"
license = "MIT"
license-files = ["LICENSE"]
author = "Chief Mouse"
author_email = "mouse.cheif@gmail.com"

[tool.briefcase.app.mschf]
formal_name = "Mischief Workspace Manager"
description = "Workspace Manager for cryptographically signed micro-apps (.msf)"
long_description = """Mischief is a Workspace Manager for micro-apps: single .msf files (SQLite) \
carrying signed UI code, RBAC rules, and a replay-auditable ledger of \
cryptographically signed transactions, verified against a local X.509 CA."""
icon = "src/mschf/resources/mschf"
sources = ["src/mschf"]
requires = [
    "toga>=0.4.0",
    "cryptography>=3.2",
    "pytz",
    "toml",
    "dill",
]
